server:
  port: 8082

spring:
  application:
    name: storage-service
  datasource:
    url: jdbc:mysql://localhost:3306/storage_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  redis:
    host: localhost
    port: 6379
    database: 0

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.storage.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus   # 暴露prometheus端点
  endpoints.prometheus.enabled: true
  metrics:
    tags:
      application: stock-service          # 全局标签，所有指标都会带上
      environment: dev
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true        # 启用HTTP请求的分位数直方图（P99）
      slo:
        http.server.requests: 10ms, 50ms, 100ms, 500ms   # 自定义SLO目标
