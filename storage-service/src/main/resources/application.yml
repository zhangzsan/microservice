server:
  port: 8082

spring:
  application:
    name: storage-service
  datasource:
    url: jdbc:mysql://localhost:3306/storage_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    alibaba:
      seata:
        enable: false
  redis:
    host: localhost
    port: 6379
    database: 0

seata:
  enabled: false
