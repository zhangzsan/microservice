server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      # 空闲连接超时时间(毫秒)，默认600000(10分钟)
      idle-timeout: 600000
      # 连接最大生命周期(毫秒)，默认1800000(30分钟)
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 连接池名称
      pool-name: OrderServiceHikariCP
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0

rocketmq:
    name-server: localhost:9876
    producer:
      group: order-producer-group
      send-message-timeout: 3000
      retry-times-when-send-failed: 3
      retry-times-when-send-async-failed: 3

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.order.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
      storage-service:
        connectTimeout: 3000
        readTimeout: 5000
      account-service:
        connectTimeout: 3000
        readTimeout: 5000
  compression:
    request:
      enabled: true
    response:
      enabled: true
  httpclient:
    enabled: true
    max-connections: 200
    max-connections-per-route: 50

order:
  timeout: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus   # 暴露prometheus端点
  endpoints.prometheus.enabled: true
  metrics:
    tags:
      application: order-service          # 全局标签，所有指标都会带上
      environment: dev
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true        # 启用HTTP请求的分位数直方图（P99）
      slo:
        http.server.requests: 10ms, 50ms, 100ms, 500ms   # 自定义SLO目标