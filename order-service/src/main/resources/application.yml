server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: order-producer-group
    send-message-timeout: 3000
    retry-times: 3

redis:
  host: localhost
  port: 6379
  password:
  database: 0

feign:
  client:
    config:
      default:
        loggerLevel: FULL
  compression:
    request:
      enabled: false
    response:
      enabled: false

logging:
  level:
    com.example.order.feign: DEBUG

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.order.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl