rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: order-producer-group
    send-message-timeout: 3000
    retry-times: 3

redis:
  host: localhost
  port: 6379
  password:
  database: 0

feign:
  client:
    config:
      default:
        loggerLevel: FULL
  compression:
    request:
      enabled: false
    response:
      enabled: false

logging:
  level:
    com.example.order.feign: DEBUG

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.order.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl